name: ekip

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ekip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ekip_dev}
      POSTGRES_DB: ${POSTGRES_DB:-ekip}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ekip"]
      interval: 10s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/ekip_dev_password}
    ports:
      - "7474:7474"   # browser
      - "7687:7687"   # bolt
    volumes:
      - neo4j_data:/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ekip}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-ekip_dev_secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build: ./backend
    env_file: .env
    environment:
      VECTOR_STORE: ${VECTOR_STORE:-qdrant}
      QDRANT_URL: http://qdrant:6333
      EKIP_DATA_DIR: /data
    volumes:
      - backend_data:/data
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pg_data:
  qdrant_data:
  neo4j_data:
  minio_data:
  backend_data:
